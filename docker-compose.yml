services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-todos}
      POSTGRES_PASSWORD: ${PGPASSWORD:-todos}
      POSTGRES_DB: ${PGDATABASE:-todos}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      # Expose to host only for local debugging. Comment out in shared envs.
      - "${PGPORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-todos} -d ${PGDATABASE:-todos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - polyrepo-shared

  api:
    build: .
    restart: unless-stopped
    environment:
      PORT: 4000
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-todos}
      PGPASSWORD: ${PGPASSWORD:-todos}
      PGDATABASE: ${PGDATABASE:-todos}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - default
      - polyrepo-shared

volumes:
  db-data:

networks:
  default:
  polyrepo-shared:
    # External shared network so the FE compose stack can reach `api` by name.
    # Create it once on the host:    docker network create polyrepo-shared
    external: true
    name: polyrepo-shared
