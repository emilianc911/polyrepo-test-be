x-app-env: &app-env
  NODE_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-info}

  PGHOST: db
  PGPORT: 5432
  # NOTE: do NOT change these defaults across releases. The `postgres` image
  # only honours POSTGRES_USER/PASSWORD/DB on the *first* boot of an empty
  # data volume; later boots ignore them. Changing the defaults bricks any
  # already-deployed environment whose volume was initialised with the old
  # values. See `migrations/001_init.sql` for how the actual schema is
  # bootstrapped (idempotently, by `src/migrate.ts`, on every API start).
  PGUSER: ${PGUSER:-todos}
  PGPASSWORD: ${PGPASSWORD:-todos}
  PGDATABASE: ${PGDATABASE:-todos}

  REDIS_URL: redis://cache:6379

  JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-please-please}
  JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-86400}

  S3_ENDPOINT: http://objects:9000
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
  S3_REGION: us-east-1
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minio12345}
  S3_BUCKET: ${S3_BUCKET:-polyrepo-uploads}
  S3_FORCE_PATH_STYLE: "true"

  SMTP_HOST: mail
  SMTP_PORT: 1025
  SMTP_FROM: "Polyrepo Demo <noreply@polyrepo.local>"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${PGUSER:-todos}
      POSTGRES_PASSWORD: ${PGPASSWORD:-todos}
      POSTGRES_DB:       ${PGDATABASE:-todos}
    volumes:
      - db-data:/var/lib/postgresql/data
      # Migrations are NOT mounted as docker-entrypoint-initdb.d any more.
      # /docker-entrypoint-initdb.d is only honoured on first boot of an empty
      # data dir, which makes schema evolution invisible to anyone who already
      # deployed the project. Schema is owned by the BE itself and applied on
      # every API start by src/migrate.ts (idempotently, with an advisory lock).
    ports:
      - "${PGPORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-todos} -d ${PGDATABASE:-todos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [default, polyrepo-shared]

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cache-data:/data
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [default, polyrepo-shared]

  objects:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER:     ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio12345}
    volumes:
      - objects-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [default, polyrepo-shared]

  mail:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks: [default]

  api:
    build: .
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: 4000
    depends_on:
      db:      { condition: service_healthy }
      cache:   { condition: service_healthy }
      objects: { condition: service_healthy }
      mail:    { condition: service_started }
    ports:
      - "${API_PORT:-4000}:4000"
    networks: [default, polyrepo-shared]

  worker:
    build: .
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment: *app-env
    depends_on:
      cache: { condition: service_healthy }
      mail:  { condition: service_started }
    networks: [default]

volumes:
  db-data:
  cache-data:
  objects-data:

networks:
  default:
  polyrepo-shared:
    # External shared network created once on the host:
    #   docker network create polyrepo-shared
    # The FE compose stack joins the same network and resolves `api` in DNS.
    external: true
    name: polyrepo-shared
